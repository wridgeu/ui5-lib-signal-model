specVersion: "4.0"
metadata:
  name: ui5.model.signal
type: library
framework:
  name: OpenUI5
  version: "1.144.0"
  libraries:
    - name: sap.ui.core
builder:
  resources:
    excludes:
      - "/test-resources/**"
  customTasks:
    - name: ui5-tooling-transpile-task
      afterTask: replaceVersion
      configuration:
        omitTSFromBuildResult: true
        transformModulesToUI5: true
server:
  customMiddleware:
    - name: ui5-tooling-transpile-middleware
      afterMiddleware: compression
      configuration:
        transformModulesToUI5: true
